openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Claimbase Expense Claim Management System API
servers:
  - url: /api
    description: Base API path
security:
  - TelegramAuth: []
tags:
  - name: health
    description: Health operations
  - name: users
    description: User management
  - name: companies
    description: Company management
  - name: categories
    description: Category management
  - name: receipts
    description: Receipt management
  - name: claims
    description: Claim period management
  - name: currency
    description: Currency conversion
  - name: storage
    description: File storage

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/me:
    get:
      operationId: getAuthMe
      tags: [users]
      summary: Get currently authenticated user
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Not authenticated

  /auth/register:
    post:
      operationId: authRegister
      tags: [users]
      summary: Register user from Telegram initData
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        "200":
          description: Registered user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Not authenticated

  /auth/telegram-login:
    post:
      operationId: authTelegramLogin
      tags: [users]
      summary: Login via Telegram Login Widget
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelegramLoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelegramLoginResponse"
        "401":
          description: Invalid login data

  /users/telegram/{telegramId}:
    get:
      operationId: getUserByTelegramId
      tags: [users]
      summary: Get user by Telegram ID
      security:
        - InternalAuth: []
      parameters:
        - name: telegramId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "404":
          description: User not found

  /users:
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user
      security:
        - InternalAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"

  /users/{userId}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
    put:
      operationId: updateUser
      tags: [users]
      summary: Update user profile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"

  /users/{userId}/companies:
    get:
      operationId: listCompanies
      tags: [companies]
      summary: List companies for a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of companies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CompanyResponse"
    post:
      operationId: createCompany
      tags: [companies]
      summary: Create a company
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompanyBody"
      responses:
        "201":
          description: Company created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyResponse"

  /companies/{companyId}:
    put:
      operationId: updateCompany
      tags: [companies]
      summary: Update a company
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCompanyBody"
      responses:
        "200":
          description: Company updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyResponse"
    delete:
      operationId: deleteCompany
      tags: [companies]
      summary: Delete a company
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Company deleted

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories (system + user custom)
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryResponse"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a custom category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryResponse"

  /categories/{categoryId}:
    put:
      operationId: updateCategory
      tags: [categories]
      summary: Update a custom category
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryBody"
      responses:
        "200":
          description: Category updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryResponse"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a custom category
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Category deleted

  /users/{userId}/receipts:
    get:
      operationId: listReceipts
      tags: [receipts]
      summary: List receipts for a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
        - name: companyId
          in: query
          required: false
          schema:
            type: integer
        - name: month
          in: query
          required: false
          schema:
            type: string
            description: "YYYY-MM format"
      responses:
        "200":
          description: List of receipts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReceiptResponse"
    post:
      operationId: createReceipt
      tags: [receipts]
      summary: Create a receipt
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReceiptBody"
      responses:
        "201":
          description: Receipt created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptResponse"

  /receipts/{receiptId}:
    get:
      operationId: getReceipt
      tags: [receipts]
      summary: Get a receipt by ID
      parameters:
        - name: receiptId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Receipt details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptResponse"
    put:
      operationId: updateReceipt
      tags: [receipts]
      summary: Update a receipt
      parameters:
        - name: receiptId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReceiptBody"
      responses:
        "200":
          description: Receipt updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptResponse"
    delete:
      operationId: deleteReceipt
      tags: [receipts]
      summary: Delete a receipt
      parameters:
        - name: receiptId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Receipt deleted

  /users/{userId}/resolved-flags:
    get:
      operationId: listResolvedFlags
      tags: [receipts]
      summary: List resolved flags for a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of resolved flags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResolvedFlag"
    post:
      operationId: resolveFlag
      tags: [receipts]
      summary: Resolve a flag on a receipt
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [receiptId, flagType]
              properties:
                receiptId:
                  type: integer
                flagType:
                  type: string
                  enum: [dupe, purpose]
      responses:
        "200":
          description: Flag resolved
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /receipts/parse-image:
    post:
      operationId: parseReceiptImage
      tags: [receipts]
      summary: Parse receipt image using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParseReceiptImageBody"
      responses:
        "200":
          description: Parsed receipt data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParsedReceiptData"

  /currency/rate:
    get:
      operationId: getExchangeRate
      tags: [currency]
      summary: Get suggested exchange rate
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
        - name: to
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Exchange rate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeRateResponse"

  /users/{userId}/claim-periods:
    get:
      operationId: listClaimPeriods
      tags: [claims]
      summary: List claim periods for a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
        - name: companyId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of claim periods
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClaimPeriodResponse"
    post:
      operationId: createClaimPeriod
      tags: [claims]
      summary: Manually create a claim period
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClaimPeriodBody"
      responses:
        "201":
          description: Created claim period
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimPeriodResponse"

  /claim-periods/{periodId}/generate:
    post:
      operationId: generateClaimForm
      tags: [claims]
      summary: Generate claim form (PDF/Excel)
      parameters:
        - name: periodId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateClaimFormBody"
      responses:
        "200":
          description: Generated claim form URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateClaimFormResponse"

  /claim-periods/{periodId}/download/{format}:
    get:
      operationId: downloadClaimForm
      tags: [claims]
      summary: Download claim form
      parameters:
        - name: periodId
          in: path
          required: true
          schema:
            type: integer
        - name: format
          in: path
          required: true
          schema:
            type: string
            enum: [pdf, excel]
      responses:
        "200":
          description: File download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /claim-periods/{periodId}/submit:
    post:
      operationId: submitClaimPeriod
      tags: [claims]
      summary: Toggle claim submission status
      parameters:
        - name: periodId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated submission status
          content:
            application/json:
              schema:
                type: object
                properties:
                  periodId:
                    type: integer
                  submittedAt:
                    type: string
                    nullable: true
                  message:
                    type: string

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlBody"
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestUploadUrlResponse"

components:
  schemas:
    ResolvedFlag:
      type: object
      properties:
        receiptId:
          type: integer
        flagType:
          type: string
      required:
        - receiptId
        - flagType

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    CreateUserBody:
      type: object
      properties:
        telegramId:
          type: string
        name:
          type: string
        timezone:
          type: string
      required:
        - telegramId
        - name

    UpdateUserBody:
      type: object
      properties:
        name:
          type: string
        timezone:
          type: string
        dashboardCurrency:
          type: string

    UserResponse:
      type: object
      properties:
        id:
          type: integer
        telegramId:
          type: string
        name:
          type: string
        timezone:
          type: string
        dashboardCurrency:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - telegramId
        - name
        - timezone
        - dashboardCurrency

    CreateCompanyBody:
      type: object
      properties:
        name:
          type: string
        baseCurrency:
          type: string
        cutoffDay:
          type: integer
        cutoffTime:
          type: string
        cutoffMonthOffset:
          type: integer
          description: "0 = same month, 1 = following month"
          default: 1
      required:
        - name
        - baseCurrency

    UpdateCompanyBody:
      type: object
      properties:
        name:
          type: string
        baseCurrency:
          type: string
        cutoffDay:
          type: integer
        cutoffTime:
          type: string
        cutoffMonthOffset:
          type: integer
          description: "0 = same month, 1 = following month"

    CompanyResponse:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        baseCurrency:
          type: string
        cutoffDay:
          type: integer
        cutoffTime:
          type: string
        cutoffMonthOffset:
          type: integer
          description: "0 = same month, 1 = following month"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - name
        - baseCurrency
        - cutoffDay
        - cutoffTime
        - cutoffMonthOffset

    CreateCategoryBody:
      type: object
      properties:
        userId:
          type: integer
        name:
          type: string
        description:
          type: string
        examples:
          type: string
      required:
        - name

    UpdateCategoryBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        examples:
          type: string

    CategoryResponse:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
          nullable: true
        name:
          type: string
        description:
          type: string
          nullable: true
        examples:
          type: string
          nullable: true
        isSystem:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - isSystem

    CreateReceiptBody:
      type: object
      properties:
        companyId:
          type: integer
        categoryId:
          type: integer
        description:
          type: string
        receiptDate:
          type: string
          format: date
        currency:
          type: string
        amount:
          type: string
        conversionRate:
          type: string
        convertedAmount:
          type: string
        imageUrl:
          type: string
        claimMonth:
          type: string
          nullable: true
          description: "YYYY-MM override for which claim period this receipt belongs to"
      required:
        - companyId
        - description
        - receiptDate
        - currency
        - amount
        - conversionRate
        - convertedAmount

    UpdateReceiptBody:
      type: object
      properties:
        companyId:
          type: integer
        categoryId:
          type: integer
        description:
          type: string
        receiptDate:
          type: string
          format: date
        currency:
          type: string
        amount:
          type: string
        conversionRate:
          type: string
        convertedAmount:
          type: string
        imageUrl:
          type: string
        claimMonth:
          type: string
          nullable: true
          description: "YYYY-MM override for which claim period this receipt belongs to"

    ReceiptResponse:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        companyId:
          type: integer
        categoryId:
          type: integer
          nullable: true
        claimPeriodId:
          type: integer
          nullable: true
        description:
          type: string
        receiptDate:
          type: string
          format: date
        currency:
          type: string
        amount:
          type: string
        conversionRate:
          type: string
        convertedAmount:
          type: string
        imageUrl:
          type: string
          nullable: true
        claimMonth:
          type: string
          nullable: true
          description: "YYYY-MM override for which claim period this receipt belongs to"
        categoryName:
          type: string
          nullable: true
        companyName:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - companyId
        - description
        - receiptDate
        - currency
        - amount
        - conversionRate
        - convertedAmount

    ParseReceiptImageBody:
      type: object
      properties:
        imageUrl:
          type: string
      required:
        - imageUrl

    ParsedReceiptData:
      type: object
      properties:
        amount:
          type: string
          nullable: true
        currency:
          type: string
          nullable: true
        date:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        receiptType:
          type: string
          enum: [standard, transfer]
        confidence:
          type: number
      required:
        - confidence
        - receiptType

    ExchangeRateResponse:
      type: object
      properties:
        from:
          type: string
        to:
          type: string
        rate:
          type: number
        source:
          type: string
        timestamp:
          type: string
      required:
        - from
        - to
        - rate
        - source

    ClaimPeriodResponse:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        companyId:
          type: integer
        periodLabel:
          type: string
        periodStart:
          type: string
          format: date-time
        periodEnd:
          type: string
          format: date-time
        status:
          type: string
        pdfUrl:
          type: string
          nullable: true
        excelUrl:
          type: string
          nullable: true
        baseCurrency:
          type: string
        totalAmount:
          type: string
          nullable: true
        downloadedAt:
          type: string
          format: date-time
          nullable: true
        submittedAt:
          type: string
          format: date-time
          nullable: true
        receiptCount:
          type: integer
          nullable: true
        companyName:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - companyId
        - periodLabel
        - status
        - baseCurrency

    CreateClaimPeriodBody:
      type: object
      properties:
        companyId:
          type: integer
        periodLabel:
          type: string
          description: "Period label in YYYY-MM format"
        periodStart:
          type: string
          format: date
        periodEnd:
          type: string
          format: date
        receiptIds:
          type: array
          description: "Optional list of specific receipt IDs to include (for partial claims). If omitted, all unclaimed receipts for the period are included."
          items:
            type: integer
        rateOverrides:
          type: array
          description: "Optional rate overrides for receipts before claim generation"
          items:
            type: object
            properties:
              receiptId:
                type: integer
              rate:
                type: string
            required:
              - receiptId
              - rate
      required:
        - companyId
        - periodLabel
        - periodStart
        - periodEnd

    GenerateClaimFormBody:
      type: object
      properties:
        format:
          type: string
          enum: [pdf, excel, both]
        rateOverrides:
          type: array
          items:
            type: object
            properties:
              receiptId:
                type: integer
              rate:
                type: string
            required:
              - receiptId
              - rate
      required:
        - format

    GenerateClaimFormResponse:
      type: object
      properties:
        periodId:
          type: integer
        pdfUrl:
          type: string
          nullable: true
        excelUrl:
          type: string
          nullable: true
        status:
          type: string
      required:
        - periodId
        - status

    RequestUploadUrlBody:
      type: object
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string
      required:
        - name
        - size
        - contentType

    RequestUploadUrlResponse:
      type: object
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string
      required:
        - uploadURL
        - objectPath

    TelegramLoginRequest:
      type: object
      properties:
        id:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        username:
          type: string
        photo_url:
          type: string
        auth_date:
          type: string
        hash:
          type: string
      required:
        - id
        - first_name
        - auth_date
        - hash

    TelegramLoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserResponse"
      required:
        - token
        - user

  securitySchemes:
    TelegramAuth:
      type: apiKey
      in: header
      name: X-Telegram-Init-Data
      description: Telegram Web App initData string (HMAC-verified, 1-hour TTL)
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT session token from Telegram Login Widget auth
    InternalAuth:
      type: apiKey
      in: header
      name: X-Internal-Key
      description: Server-to-server authentication key (used by Telegram bot only)
